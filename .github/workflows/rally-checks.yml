name: rally checks
on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
jobs:
  check-rally-integration:
    name: check-rally-artifact
    uses: RepublicServicesRepository/dops-actions/.github/workflows/rally-integration.yml@stable
    secrets:
      github_pat: ${{ secrets.REPUBLIC_SYSTEM_RISE_PAT }}
      rally_api_key: ${{secrets.RALLY_API_KEY}}
    with:
        check_milestone: "true"